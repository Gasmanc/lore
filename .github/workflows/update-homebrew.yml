name: Update Homebrew Tap

# Triggers:
# 1. workflow_run — fires after the Release workflow completes (workflow→workflow
#    loops are blocked for GITHUB_TOKEN, so we can't use `release: published`).
# 2. workflow_dispatch — manual backfill trigger; split into a separate job so
#    GitHub always recognises the dispatch trigger regardless of the if-condition
#    on the shared job.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update (e.g. v0.2.0)"
        required: true
        default: "v0.2.0"

jobs:
  update-formula:
    name: Update homebrew-lore formula
    # For workflow_run: only run when the Release workflow succeeded.
    # For workflow_dispatch: always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256SUMS from release
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" --pattern SHA256SUMS --dir /tmp

      - name: Extract checksums
        id: sums
        run: |
          SUMS=/tmp/SHA256SUMS
          extract() { grep "$1" "$SUMS" | awk '{print $1}'; }

          echo "aarch64_macos=$(extract 'aarch64-apple-darwin.tar.gz')"      >> "$GITHUB_OUTPUT"
          echo "x86_64_macos=$(extract 'x86_64-apple-darwin.tar.gz')"        >> "$GITHUB_OUTPUT"
          echo "aarch64_linux=$(extract 'aarch64-unknown-linux-gnu.tar.gz')" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(extract 'x86_64-unknown-linux-gnu.tar.gz')"   >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Gasmanc/homebrew-lore
          path: homebrew-lore
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Write updated formula
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          AARCH64_MACOS: ${{ steps.sums.outputs.aarch64_macos }}
          X86_64_MACOS: ${{ steps.sums.outputs.x86_64_macos }}
          AARCH64_LINUX: ${{ steps.sums.outputs.aarch64_linux }}
          X86_64_LINUX: ${{ steps.sums.outputs.x86_64_linux }}
        run: |
          # Write the static header (single-quoted heredoc — no variable expansion)
          cat > homebrew-lore/Formula/lore.rb << 'HEADER'
# Homebrew formula for the lore CLI.
# Auto-generated by update-homebrew.yml — do not edit by hand.
#
# To install:
#   brew tap Gasmanc/lore
#   brew install lore
HEADER

          # Append the dynamic body (double-quoted heredoc — shell expands ${VERSION} etc.)
          cat >> homebrew-lore/Formula/lore.rb << BODY

class Lore < Formula
  desc "Local documentation server for AI coding assistants"
  homepage "https://github.com/Gasmanc/lore"
  version "${VERSION}"
  license "MIT"

  on_macos do
    on_arm do
      url "https://github.com/Gasmanc/lore/releases/download/v${VERSION}/lore-v${VERSION}-aarch64-apple-darwin.tar.gz"
      sha256 "${AARCH64_MACOS}"
    end

    on_intel do
      url "https://github.com/Gasmanc/lore/releases/download/v${VERSION}/lore-v${VERSION}-x86_64-apple-darwin.tar.gz"
      sha256 "${X86_64_MACOS}"
    end
  end

  on_linux do
    on_arm do
      # aarch64-linux binary is not yet available; install via cargo instead:
      #   cargo install lore-cli
      odie "Pre-built aarch64 Linux binary not available yet. Install with: cargo install lore-cli"
    end

    on_intel do
      url "https://github.com/Gasmanc/lore/releases/download/v${VERSION}/lore-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
      sha256 "${X86_64_LINUX}"
    end
  end

  def install
    bin.install "lore"
  end

  def caveats
    <<~EOS
      The first time lore downloads a package it will fetch the bge-small-en-v1.5
      embedding model (~130 MB) and cache it in:
        ~/.cache/lore/models/

      To get started, add a documentation package:
        lore add tokio

      Then configure your AI assistant to use the MCP server:
        lore mcp
    EOS
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/lore --version")
  end
end
BODY

      - name: Commit and push formula
        working-directory: homebrew-lore
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lore.rb
          git commit -m "lore ${VERSION}"
          git push
