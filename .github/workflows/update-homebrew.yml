name: Update Homebrew Tap

# Two thin trigger jobs that both delegate to `_update-homebrew-impl.yml`.
# Splitting workflow_run and workflow_dispatch into separate jobs (rather than
# gating one job with `if:`) prevents GitHub from silently dropping the
# dispatch trigger from the workflow's registered triggers.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update (e.g. v0.3.0)"
        required: true
        default: "v0.3.0"
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  on-release:
    name: After successful release
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_update-homebrew-impl.yml
    with:
      tag: ${{ github.event.workflow_run.head_branch }}
    secrets: inherit

  on-dispatch:
    name: Manual dispatch
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_update-homebrew-impl.yml
    with:
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit
