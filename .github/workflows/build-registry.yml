name: Build Registry

on:
  push:
    branches: [main, master]
    paths:
      - "packages/**"
  workflow_dispatch:
    inputs:
      package:
        description: "Specific package to rebuild (e.g. npm/next). Leave blank to rebuild all."
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  discover:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan package specs
        id: scan
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          if [ -n "$INPUT_PACKAGE" ]; then
            spec="packages/${INPUT_PACKAGE}.yaml"
            matrix=$(printf '["%s"]' "$spec" | jq -c '.')
          else
            matrix=$(find packages -maxdepth 2 -name '*.yaml' | sort | jq -R . | jq -sc '.')
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.spec }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build lore CLI
        run: cargo build --release -p lore-cli

      - name: Build package from spec
        id: build-pkg
        env:
          SPEC: ${{ matrix.spec }}
        run: |
          # `yq` (mikefarah) is preinstalled on ubuntu-latest runners and handles
          # quoted/unquoted YAML scalars uniformly.  `// ""` coerces missing
          # fields to the empty string so unset optional values don't blow up.
          name=$(yq -r '.name // ""' "$SPEC")
          version=$(yq -r '.version // ""' "$SPEC")
          registry=$(yq -r '.registry // ""' "$SPEC")
          description=$(yq -r '.description // ""' "$SPEC")
          source_url=$(yq -r '.source_url // ""' "$SPEC")
          source_type=$(yq -r '.source.type // ""' "$SPEC")

          outdir="dist"
          mkdir -p "$outdir"
          db="$outdir/${registry}-${name}@${version}.db"

          # Use a bash array so values containing spaces (e.g. descriptions
          # like "Tree-sitter — incremental parsing system") survive intact.
          build_args=(--name "$name" --version "$version" --registry "$registry" --output "$db")
          [ -n "$description" ] && build_args+=(--description "$description")
          [ -n "$source_url" ]  && build_args+=(--source-url "$source_url")

          case "$source_type" in
            git)
              url=$(yq -r '.source.url // ""' "$SPEC")
              branch=$(yq -r '.source.branch // ""' "$SPEC")
              subdir=$(yq -r '.source.subdir // ""' "$SPEC")
              clone_args=(--depth 1)
              [ -n "$branch" ] && clone_args+=(--branch "$branch")
              git clone "${clone_args[@]}" "$url" _src
              src="_src${subdir:+/$subdir}"
              ./target/release/lore build "$src" "${build_args[@]}"
              ;;
            local)
              dir=$(yq -r '.source.dir // ""' "$SPEC")
              ./target/release/lore build "$dir" "${build_args[@]}"
              ;;
            website)
              echo "Source type 'website' requires a live crawl and is not supported in CI."
              echo "Remove this spec from packages/ or switch it to type: git."
              exit 1
              ;;
            *)
              echo "Unknown source type: '$source_type'"
              exit 1
              ;;
          esac

          # Derive a filesystem-safe artifact name (replace / with --, drop extension).
          artifact=$(echo "$SPEC" | tr '/' '--' | sed 's/\.yaml$//')
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-pkg.outputs.artifact }}
          path: dist/

  publish:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Fetch existing index from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Download the current live index so we can merge new builds into it
          # rather than replacing the entire catalogue on each single-package run.
          if gh release download registry --repo "$REPO" --pattern index.json --output dist/existing-index.json 2>/dev/null; then
            echo "Fetched existing index ($(jq length dist/existing-index.json) entries)"
          else
            echo "No existing index found; starting fresh."
            echo '[]' > dist/existing-index.json
          fi

      - name: Build index.json
        env:
          REPO: ${{ github.repository }}
        run: |
          # PackageMetadata is #[serde(flatten)] so the JSON sidecar is flat:
          # { "name": "...", "registry": "...", "version": "...", ... }
          # Use .registry / .name / .version (not .package.*).
          build_entry() {
            jq --arg repo "$REPO" \
              '. + {download_url: ("https://github.com/\($repo)/releases/download/registry/" + .registry + "-" + .name + "@" + .version + ".db")}' \
              "$1"
          }

          mapfile -d '' new_files < <(find dist -name '*.json' ! -name 'existing-index.json' -print0 | sort -z)

          # Build array of newly-built entries (with corrected download_url).
          new_entries='[]'
          for f in "${new_files[@]}"; do
            entry=$(build_entry "$f")
            new_entries=$(echo "$new_entries" | jq --argjson e "$entry" '. + [$e]')
          done

          # Merge: existing entries whose key isn't in this run + new entries.
          jq -s \
            '.[0] as $existing | .[1] as $new |
             ($new | map(.registry + "-" + .name + "@" + .version)) as $updated_keys |
             ($existing | map(select((.registry + "-" + .name + "@" + .version) as $k | $updated_keys | index($k) | not))) +
             $new' \
            dist/existing-index.json <(echo "$new_entries") > dist/index.json

          echo "Final index: $(jq length dist/index.json) entries"

      - name: Upload registry release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: registry
          name: Package Registry
          body: "Auto-published package registry index."
          files: |
            dist/*.db
            dist/index.json
